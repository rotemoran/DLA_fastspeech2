transformer:
  encoder_layer: 4
  encoder_head: 2
  encoder_hidden: 256
  decoder_layer: 4
  decoder_head: 2
  decoder_hidden: 256
  conv_filter_size: 1024
  conv_kernel_size: [9, 1]
  encoder_dropout: 0.1
  decoder_dropout: 0.1

variance_predictor:
  filter_size: 256
  kernel_size: 3
  dropout: 0.5

variance_embedding:
  pitch_quantization: "linear" # support 'linear' or 'log', 'log' is allowed only if the pitch values are not normalized during preprocessing
  energy_quantization: "linear" # support 'linear' or 'log', 'log' is allowed only if the energy values are not normalized during preprocessing
  n_bins: 256
  num_scales: 10  # CWT pitch spectrogram scales (must match preprocess cwt_num_scales)

multi_speaker: False

max_seq_len: 1000

vocoder:
  model: "Parallel WaveGAN" # paper uses PWG; also support 'HiFi-GAN', 'MelGAN', 'PWG'
  speaker: "LJSpeech" # support 'LJSpeech', 'universal' (for HiFi-GAN/MelGAN)
  Optional: override paths for Parallel WaveGAN (defaults below)
  config: "train_nodev_ljspeech_parallel_wavegan.v1/config.yml"
  checkpoint: "train_nodev_ljspeech_parallel_wavegan.v1/checkpoint-400000steps.pkl"
