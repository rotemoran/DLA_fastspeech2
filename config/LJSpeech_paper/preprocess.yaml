dataset: "LJSpeech_paper"

path:
  corpus_path: "data/LJSpeech-1.1"
  lexicon_path: "lexicon/librispeech-lexicon.txt"
  raw_path: "./raw_data/LJSpeech"
  preprocessed_path: "./preprocessed_data/LJSpeech_paper"

preprocessing:
  val_size: 512
  text:
    text_cleaners: ["english_cleaners"]
    language: "en"
  audio:
    sampling_rate: 22050
    max_wav_value: 32768.0
  stft:
    filter_length: 1024
    hop_length: 256
    win_length: 1024
  mel:
    n_mel_channels: 80
    mel_fmin: 0
    mel_fmax: 7600 # 7600 for Parallel WaveGAN (paper); 8000 for HiFi-GAN; null for MelGAN
  pitch:
    feature: "frame_level" # support 'phoneme_level' or 'frame_level'
    normalization: False
    use_cwt: True       # CWT pitch spectrogram (paper Appendix C)
    cwt_num_scales: 10  # number of wavelet scales (paper uses 10)
  energy:
    feature: "frame_level" # support 'phoneme_level' or 'frame_level'
    normalization: False
