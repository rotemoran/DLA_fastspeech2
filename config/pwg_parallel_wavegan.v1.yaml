# Parallel WaveGAN v1 config for LJSpeech (matches FastSpeech 2 paper vocoder).
# Pretrained checkpoint: https://drive.google.com/open?id=1wdHr1a51TLeo4iKrGErVKHVFyq6D17TU
# From: https://github.com/kan-bayashi/ParallelWaveGAN (egs/ljspeech/voc1/conf/parallel_wavegan.v1.yaml)

sampling_rate: 22050
fft_size: 1024
hop_size: 256
win_length: null
window: "hann"
num_mels: 80
fmin: 80
fmax: 7600

generator_type: "ParallelWaveGANGenerator"
generator_params:
  in_channels: 1
  out_channels: 1
  kernel_size: 3
  layers: 30
  stacks: 3
  residual_channels: 64
  gate_channels: 128
  skip_channels: 64
  aux_channels: 80
  aux_context_window: 2
  dropout: 0.0
  use_weight_norm: true
  upsample_net: "ConvInUpsampleNetwork"
  upsample_params:
    upsample_scales: [4, 4, 4, 4]
